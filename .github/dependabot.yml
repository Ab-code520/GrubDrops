version: 2
updates:
  # Go modules — one grouped PR per week for all minor/patch bumps.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-deps:
        patterns: ["*"]

  # Docker base images for the miner + browser sidecar.
  - package-ecosystem: docker
    directories:
      - /deploy
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]

  # GitHub Actions versions (keeps actions off deprecated Node runtimes).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]
