{{define "login.html"}}{{template "layout" .}}{{end}}

{{define "title"}}Login · GrubDrops{{end}}

{{define "content"}}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="kicker">// sign in</div>
    <h1>GrubDrops</h1>
    {{if .Flash}}<div class="err">{{.Flash}}</div>{{end}}

    {{if .OIDCEnabled}}
    <a class="btn-sso" href="/auth/oidc/login">→ Continue with SSO</a>
    <div class="sso-divider"><span>or</span></div>
    <form method="post" action="/login" class="auth-secondary">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Admin password<input type="password" name="password" required></label>
      <div class="submit-row">
        <span></span>
        <button class="btn" type="submit">Sign in →</button>
      </div>
    </form>
    {{else}}
    <form method="post" action="/login">
      <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
      <label>Password<input type="password" name="password" required autofocus></label>
      <div class="submit-row">
        <span></span>
        <button class="btn primary" type="submit">Sign in →</button>
      </div>
    </form>
    {{end}}
  </div>
</div>
{{end}}
